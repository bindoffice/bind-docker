version: '3'

services:
  redis:
    image: ${DOCKER_REGISTRY}bindoffice/redis:6.0
    restart: always
    container_name: meet_redis
    volumes:
      - ./redis/data:/data/redis
      - ./redis/logs/redis.log:/data/logs/redis.log
      - ./redis/redis.conf:/etc/redis/redis.conf
    command:
      redis-server /etc/redis/redis.conf
    network_mode: "host"

  
  meet-server:
    image: ${DOCKER_REGISTRY}bindoffice/bind-meetserver:latest
    restart: always
    volumes:
      - ./meetserver/config.yaml:/data/www/bind-meetserver/config.yaml
      - ./meetserver/certs:/tmp/bind_certs
      - /etc/ssl/certs/ca-bundle.crt:/etc/ssl/certs/ca-bundle.crt
      - /etc/ssl/certs/ca-bundle.trust.crt:/etc/ssl/certs/ca-bundle.trust.crt
    working_dir: /data/www/bind-meetserver
    command: ["/data/www/bind-meetserver/bind-meetserver"]
    network_mode: "host"
    environment:
      BIND_SELF_DOMAIN: "${DOMAIN}"
      BIND_MEET_ADDR: "${MEET_ADDR}"
      REDIS_ADDR: "${REDIS_ADDR}"
      REDIS_USER: "${REDIS_USER}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      BIND_MEET_KEY: "${MEET_KEY}"
      BIND_MEET_SECRET: "${MEET_SECRET}"
      BIND_MEET_AUTH_TYPE: "${MEET_AUTH_TYPE}"
      BIND_LDAP_ENABLED: "${MEET_LDAP_ENABLED}"
      BIND_LDAP_ADDR: "${MEET_LDAP_ADDR}" # ldap://127.0.0.1:42389
      BIND_LDAP_BASE_DN: "${MEET_LDAP_BASE_DN}" # dc=bindoffice,dc=com

    depends_on:
      - redis


  nginx:   #
    image: ${DOCKER_REGISTRY}bindoffice/nginx:1.22  #nginx镜像，如果镜像容器没有会去自动拉取
    container_name: meet_nginx       #容器的名称
    restart: always             #跟随docker的启动而启动
    volumes:                    #挂载卷命令
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs/access.log:/var/log/nginx_access.log
      - ./nginx/logs/error.log:/var/log/nginx_error.log
      - ./nginx/conf.d/meet.conf:/etc/nginx/conf.d/default.conf #映射配置文件
      - ./nginx/certs:/etc/nginx/certs:rw

    depends_on:
      - redis
      - meet-server
    network_mode: "host"

volumes:
    redis:
    meet-server:
    nginx:
